{% extends "base.html" %}
{% block title %}概览 - QNAP 文件索引{% endblock %}
{% block content %}
<div class="page">
  <section class="section-block">
    <h1>概览</h1>
    <p>文件：{{ file_count }}</p>
    <p>文件夹：{{ directory_count }}</p>
    <p>
      最后成功扫描：
      {{ last_successful_scan.finished_at if last_successful_scan else "尚无记录" }}
    </p>
  </section>

  <section class="section-block">
      <form method="post" action="/scans" class="inline-actions">
        <button type="submit">开始扫描</button>
      </form>
      <div id="scan-status"
           hx-get="/scans/status"
           hx-trigger="load"
           hx-swap="innerHTML">
        {% if scan %}{{ scan.status }}{% else %}尚未扫描{% endif %}
      </div>
  </section>
</div>
{% endblock %}
