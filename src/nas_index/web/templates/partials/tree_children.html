<ul>
{% for directory in directories %}
  <li>
    <a href="/browse?path={{ directory.full_path | urlencode }}">
      {{ directory.name }}
    </a>
    <button type="button"
            hx-get="/browse/tree?path={{ directory.full_path | urlencode }}"
            hx-target="next .tree-children"
            hx-swap="innerHTML">
      展开
    </button>
    <div class="tree-children"></div>
  </li>
{% endfor %}
</ul>
