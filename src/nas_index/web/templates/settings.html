{% extends "base.html" %}
{% block title %}设置 - QNAP 文件索引{% endblock %}
{% block content %}
<div class="page">
  <section class="section-block">
    <h1>设置</h1>
    <p>连接 NAS 所需的最少配置。</p>
  </section>

  <p class="plain-note">密码会以明文保存在本机数据库中。</p>

  {% if error %}
    <p>{{ error }}</p>
  {% endif %}

  <section class="section-block">
    <form method="post" action="/settings" class="stack-form">
      <label>
        主机
        <input name="host"
               required
               value="{{ config.base_url if config else '' }}">
      </label>
      <label>
        端口
        <input name="port"
               type="number"
               required
               value="{{ config.port if config else 8080 }}">
      </label>
      <label class="checkbox-line">
        <input name="use_https"
               type="checkbox"
               value="true"
               {% if config and config.use_https %}checked{% endif %}>
        使用 HTTPS
      </label>
      <label>
        用户名
        <input name="username"
               required
               value="{{ config.username if config else '' }}">
      </label>
      <label>
        密码
        <input name="password"
               type="password"
               value=""
               {% if not config %}required{% endif %}
               autocomplete="new-password">
      </label>

      {% if config %}
        <p class="plain-note">密码已保存；留空表示保持不变。</p>
      {% endif %}

      <div class="inline-actions">
        <button type="submit">保存设置</button>
        <button type="button"
                hx-post="/settings/test"
                hx-target="#connection-result"
                hx-swap="innerHTML">
          测试连接
        </button>
      </div>
    </form>
  </section>

  <div id="connection-result"></div>
</div>
{% endblock %}
