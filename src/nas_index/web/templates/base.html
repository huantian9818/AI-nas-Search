<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}QNAP 文件索引{% endblock %}</title>
  <link rel="stylesheet"
        href="{{ url_for('static', path='/app.css') }}?v={{ static_version }}">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <p class="site-title">
        <a href="/">QNAP 文件索引</a>
      </p>
      <nav class="site-nav" aria-label="主导航">
        <a class="{% if request.url.path == '/' %}is-active{% endif %}"
           href="/">
          概览
        </a>
        <a class="{% if request.url.path.startswith('/browse') %}is-active{% endif %}"
           href="/browse">
          目录
        </a>
        <a class="{% if request.url.path.startswith('/search') %}is-active{% endif %}"
           href="/search">
          搜索
        </a>
        {% if current_access(request) %}
          <form method="post"
                action="/access/logout"
                class="nav-action-form">
            <button type="submit">退出当前用户</button>
          </form>
        {% endif %}
        {% if is_admin(request) %}
          <a class="{% if request.url.path.startswith('/settings') %}is-active{% endif %}"
             href="/settings">
            设置
          </a>
        {% endif %}
      </nav>
    </header>
    <main class="page-shell">{% block content %}{% endblock %}</main>
  </div>
</body>
</html>
